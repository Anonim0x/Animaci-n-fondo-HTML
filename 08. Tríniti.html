<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OBS Triangle Wave Pattern</title>

<style>

html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
}

canvas{
    display:block;
    width:100%;
    height:100%;
}

</style>
</head>

<body>

<canvas id="canvas"></canvas>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let w,h;
let time = 0;

function resize(){

    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;

}

window.addEventListener("resize", resize);
resize();



// =====================================
// CONFIG
// =====================================

const spacing = 26;

let cols, rows;

function updateGrid(){

    cols = Math.ceil(w / spacing) + 10;
    rows = Math.ceil(h / spacing) + 10;

}

updateGrid();

window.addEventListener("resize", updateGrid);



// =====================================
// TRIÁNGULO OUTLINE
// =====================================

function drawTriangle(x,y,size,rotation,alpha,invert){

    ctx.save();

    ctx.translate(x,y);

    ctx.rotate(rotation);

    ctx.beginPath();

    if(!invert){

        // triángulo hacia arriba
        ctx.moveTo(0,-size);

        ctx.lineTo(size,size);

        ctx.lineTo(-size,size);

    }else{

        // triángulo hacia abajo
        ctx.moveTo(0,size);

        ctx.lineTo(size,-size);

        ctx.lineTo(-size,-size);

    }

    ctx.closePath();

    ctx.strokeStyle =
        `rgba(255,255,255,${alpha})`;

    ctx.lineWidth = 1.2;

    ctx.stroke();

    ctx.restore();

}



// =====================================
// LOOP
// =====================================

function animate(){

    // fade suave cinematográfico
    ctx.fillStyle = "rgba(0,0,0,0.08)";
    ctx.fillRect(0,0,w,h);

    for(let y=-5; y<rows; y++){

        for(let x=-5; x<cols; x++){

            const px = x * spacing;
            const py = y * spacing;

            // =================================
            // ONDA DIAGONAL SUAVE
            // =================================

            const wave =

                Math.sin(
                    (px + py) * 0.007
                    + time * 0.42
                ) * 18 +

                Math.cos(
                    (px - py) * 0.004
                    - time * 0.22
                ) * 10;

            const dx =
                px + wave * 1.7;

            const dy =
                py + wave * 0.9;

            // profundidad ligera
            const z =

                Math.sin(
                    (px + py) * 0.004
                    + time * 0.25
                );

            const size =
                3 + ((z + 1) * 2.4);

            const alpha =
                0.08 + ((z + 1) * 0.14);

            const rotation =
                wave * 0.015;

            // patrón alternado arriba/abajo
            const invert =
                (x + y) % 2 === 0;

            drawTriangle(
                dx,
                dy,
                size,
                rotation,
                alpha,
                invert
            );

        }
    }

    // movimiento orgánico lento
    time += 0.004;

    requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
