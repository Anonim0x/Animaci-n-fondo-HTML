<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OBS Fullscreen Orbital Dust</title>

<style>

html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
}

canvas{
    display:block;
    width:100%;
    height:100%;
    filter: contrast(115%);
}

</style>
</head>

<body>

<canvas id="canvas"></canvas>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let w,h;
let time = 0;

function resize(){

    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;

}

window.addEventListener("resize", resize);
resize();



// =====================================
// CONFIG
// =====================================

const particles = [];

// MUCHAS partículas
const total = 4200;



// =====================================
// CREAR PARTÍCULAS
// =====================================

for(let i=0;i<total;i++){

    particles.push({

        orbit:
            40 + Math.random() * (Math.max(w,h) * 0.9),

        angle:
            Math.random() * Math.PI * 2,

        speed:
            0.00015 + Math.random() * 0.0008,

        size:
            0.15 + Math.random() * 0.8,

        depth:
            Math.random(),

        offset:
            Math.random() * 2000

    });

}



// =====================================
// LOOP
// =====================================

function animate(){

    // fade cinematográfico suave
    ctx.fillStyle = "rgba(0,0,0,0.07)";
    ctx.fillRect(0,0,w,h);

    const cx = w / 2;
    const cy = h / 2;

    for(const p of particles){

        // =================================
        // ÓRBITAS ORGÁNICAS
        // =================================

        const wave =

            Math.sin(
                time * 0.15 +
                p.offset
            ) * 60;

        const orbit =
            p.orbit + wave;

        // movimiento orbital
        p.angle += p.speed;

        // deformación suave
        const deform =

            Math.sin(
                p.angle * 3 +
                time * 0.3
            ) * 12;

        // distribución FULLSCREEN
        const x =

            cx +

            Math.cos(p.angle) *

            (orbit + deform);

        const y =

            cy +

            Math.sin(p.angle) *

            (orbit * 0.8 + deform);

        // profundidad falsa
        const z =

            Math.sin(
                p.angle * 2 +
                time
            );

        // brillo suave
        const alpha =

            0.015 +

            (p.depth * 0.05) +

            ((z + 1) * 0.025);

        // partículas MUY pequeñas
        const size =

            p.size +

            ((z + 1) * 0.15);

        // =================================
        // PARTÍCULA
        // =================================

        ctx.beginPath();

        ctx.fillStyle =
            `rgba(255,255,255,${alpha})`;

        ctx.arc(
            x,
            y,
            size,
            0,
            Math.PI * 2
        );

        ctx.fill();

    }

    // movimiento ultra suave
    time += 0.0125;

    requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
