<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patrón Hexagonal B&N</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html {
    --s: 56px;
    --g: 8px;
    --c: #ffffff;
    --_l: #0000 calc(33% - .866*var(--g)),
          var(--c) calc(33.2% - .866*var(--g)) 33%,
          #0000 34%;
    background:
      repeating-linear-gradient(var(--c) 0 var(--g), #0000 0 50%)
        0 calc(.866*var(--s) - var(--g)/2),
      conic-gradient(from -150deg at var(--g) 50%, var(--c) 120deg, #0000 0),
      linear-gradient(-120deg, var(--_l)),
      linear-gradient(-60deg,  var(--_l))
      #000000;
    background-size: var(--s) calc(3.466*var(--s));
    animation: p infinite 2s linear;
    min-height: 100vh;
    transform: rotate(-25deg) scale(1.5);
    transform-origin: center center;
  }

  html::before {
    --s: 56px;
    --g: 8px;
    --c: #ffffff;
    --_l: #0000 calc(33% - .866*var(--g)),
          var(--c) calc(33.2% - .866*var(--g)) 33%,
          #0000 34%;
    background:
      repeating-linear-gradient(var(--c) 0 var(--g), #0000 0 50%)
        0 calc(.866*var(--s) - var(--g)/2),
      conic-gradient(from -150deg at var(--g) 50%, var(--c) 120deg, #0000 0),
      linear-gradient(-120deg, var(--_l)),
      linear-gradient(-60deg,  var(--_l))
      #000000;
    background-size: var(--s) calc(3.466*var(--s));
    content: "";
    position: fixed;
    inset: -50%;
    -webkit-mask:
      linear-gradient(#000 50%, #0000 0)
      0 calc(.866*var(--s)) / 100% calc(3.466*var(--s));
    mask:
      linear-gradient(#000 50%, #0000 0)
      0 calc(.866*var(--s)) / 100% calc(3.466*var(--s));
    animation: p infinite 2s linear;
    animation-direction: reverse;
    transform: rotate(-25deg) scale(1.5);
    transform-origin: center center;
  }

  @keyframes p {
    to { background-position-x: calc(-1*var(--s)); }
  }
</style>
</head>
<body>
</body>
</html>
