<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Malla 3D</title>
<style>
html, body {
  margin: 0; padding: 0; overflow: hidden;
  background: #000; width: 100%; height: 100%;
}
canvas { display: block; width: 100%; height: 100%; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");
let w, h;

function resize() {
  w = c.width = window.innerWidth;
  h = c.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

const POINTS = 180;
const CONNECT_DIST = 220;
const DEPTH = 600;

const pts = Array.from({ length: POINTS }, () => ({
  x: (Math.random() - 0.5) * 600,
  y: (Math.random() - 0.5) * 600,
  z: (Math.random() - 0.5) * DEPTH,
  vx: (Math.random() - 0.5) * 0.6,
  vy: (Math.random() - 0.5) * 0.6,
  vz: (Math.random() - 0.5) * 0.6,
}));

let rotX = 0, rotY = 0;

function project(p) {
  const focal = 800;
  const scale = focal / (focal + p.z);
  return { sx: p.x * scale + w / 2, sy: p.y * scale + h / 2, scale };
}

function rotateX(p, angle) {
  const c = Math.cos(angle), s = Math.sin(angle);
  const y = p.y * c - p.z * s;
  const z = p.y * s + p.z * c;
  return { x: p.x, y, z };
}

function rotateY(p, angle) {
  const c = Math.cos(angle), s = Math.sin(angle);
  const x = p.x * c + p.z * s;
  const z = -p.x * s + p.z * c;
  return { x, y: p.y, z };
}

function draw() {
  requestAnimationFrame(draw);

  ctx.fillStyle = "rgba(0,0,0,0.12)";
  ctx.fillRect(0, 0, w, h);

  rotX += 0.002;
  rotY += 0.003;

  const projected = pts.map(p => {
    p.x += p.vx; p.y += p.vy; p.z += p.vz;
    if (Math.abs(p.x) > 300) p.vx *= -1;
    if (Math.abs(p.y) > 300) p.vy *= -1;
    if (Math.abs(p.z) > DEPTH / 2) p.vz *= -1;

    let r = rotateY(p, rotY);
    r = rotateX(r, rotX);
    return { ...project(r), orig: p };
  });

  for (let i = 0; i < projected.length; i++) {
    for (let j = i + 1; j < projected.length; j++) {
      const a = projected[i], b = projected[j];
      const dx = a.sx - b.sx, dy = a.sy - b.sy;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < CONNECT_DIST) {
        const alpha = (1 - dist / CONNECT_DIST) * 0.5;
        const avgScale = (a.scale + b.scale) / 2;
        ctx.beginPath();
        ctx.moveTo(a.sx, a.sy);
        ctx.lineTo(b.sx, b.sy);
        ctx.strokeStyle = `rgba(100,200,255,${alpha * avgScale})`;
        ctx.lineWidth = 0.6 + avgScale * 0.4;
        ctx.stroke();
      }
    }
  }

  for (const p of projected) {
    const r = 1 + p.scale * 2;
    const grad = ctx.createRadialGradient(p.sx, p.sy, 0, p.sx, p.sy, r);
    grad.addColorStop(0, `rgba(180,230,255,${0.8 * p.scale})`);
    grad.addColorStop(1, `rgba(100,200,255,0)`);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(p.sx, p.sy, r, 0, Math.PI * 2);
    ctx.fill();
  }
}

draw();
</script>
</body>
</html>
