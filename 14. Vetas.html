<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>OBS Flow Layers Fullscreen</title>

<style>
    html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
    }

    canvas {
        width: 100vw;
        height: 100vh;
        display: block;
    }
</style>
</head>

<body>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");

const ctx = canvas.getContext("2d", {
    alpha: false,
    desynchronized: true
});

let w, h;
let time = 0;

function resize() {

    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;

}

resize();

window.addEventListener("resize", resize);

function drawLayer(index, total) {

    const spacing =
        w / (total - 2);

    const baseX =
        (index * spacing) - 200;

    ctx.beginPath();

    for (let y = -200; y <= h + 200; y += 5) {

        const waveA =
            Math.sin((y * 0.0035) + time + index * 0.25) * 110;

        const waveB =
            Math.cos((y * 0.0018) + time * 0.4) * 35;

        const x =
            baseX +
            waveA +
            waveB;

        if (y === -200) {

            ctx.moveTo(x, y);

        } else {

            ctx.lineTo(x, y);

        }
    }

    ctx.lineTo(w + 400, h + 400);
    ctx.lineTo(w + 400, -400);

    ctx.closePath();

    const brightness =
        18 + (index / total) * 82;

    const gradient =
        ctx.createLinearGradient(0, 0, w, h);

    gradient.addColorStop(
        0,
        `rgb(${brightness},${brightness},${brightness})`
    );

    gradient.addColorStop(
        1,
        `rgb(${brightness + 25},${brightness + 25},${brightness + 25})`
    );

    ctx.fillStyle = gradient;

    ctx.shadowColor = "rgba(255,255,255,0.10)";
    ctx.shadowBlur = 25;

    ctx.fill();
}

function animate() {

    time += 0.0035;

    ctx.fillStyle = "#000";
    ctx.fillRect(0, 0, w, h);

    const layers = 18;

    for (let i = 0; i < layers; i++) {

        drawLayer(i, layers);

    }

    requestAnimationFrame(animate);
}

requestAnimationFrame(animate);

</script>

</body>
</html>
