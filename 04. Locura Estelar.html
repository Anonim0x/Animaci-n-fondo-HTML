<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OBS Magnetic Field</title>

<style>

html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
}

canvas{
    display:block;
    width:100%;
    height:100%;
    filter: contrast(115%);
}

</style>
</head>

<body>

<canvas id="canvas"></canvas>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let w,h;
let time = 0;

function resize(){

    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;

}

window.addEventListener("resize", resize);
resize();



// =====================================
// CONFIG
// =====================================

const particles = [];
const total = 2600;



// =====================================
// CREAR PARTÍCULAS
// =====================================

for(let i=0;i<total;i++){

    particles.push({

        x: Math.random() * w,
        y: Math.random() * h,

        size:
            0.25 + Math.random() * 1.4,

        depth:
            Math.random(),

        offset:
            Math.random() * 1000

    });

}



// =====================================
// CAMPO MAGNÉTICO
// =====================================

function field(x,y){

    const cx = w / 2;
    const cy = h / 2;

    const dx = x - cx;
    const dy = y - cy;

    const dist =
        Math.sqrt(dx*dx + dy*dy);

    const angle =
        Math.atan2(dy,dx);

    // ondas circulares
    const wave =

        Math.sin(
            dist * 0.012 -
            time * 1.8
        ) * 2.5;

    // espiral magnética
    const spiral =
        angle + wave;

    return {

        x: Math.cos(spiral),
        y: Math.sin(spiral)

    };

}



// =====================================
// LOOP
// =====================================

function animate(){

    // fade cinematográfico
    ctx.fillStyle = "rgba(0,0,0,0.07)";
    ctx.fillRect(0,0,w,h);

    for(const p of particles){

        // =============================
        // DIRECCIÓN DEL CAMPO
        // =============================

        const f =
            field(p.x,p.y);

        // movimiento orgánico
        p.x += f.x * (0.15 + p.depth * 0.6);
        p.y += f.y * (0.15 + p.depth * 0.6);

        // wrap elegante
        if(p.x < -20) p.x = w + 20;
        if(p.x > w + 20) p.x = -20;

        if(p.y < -20) p.y = h + 20;
        if(p.y > h + 20) p.y = -20;

        // profundidad falsa
        const pulse =

            Math.sin(
                time +
                p.offset
            );

        const alpha =

            0.02 +

            (p.depth * 0.08) +

            ((pulse + 1) * 0.02);

        const size =

            p.size +

            ((pulse + 1) * 0.15);

        // =============================
        // PARTÍCULA
        // =============================

        ctx.beginPath();

        ctx.fillStyle =
            `rgba(255,255,255,${alpha})`;

        ctx.arc(
            p.x,
            p.y,
            size,
            0,
            Math.PI * 2
        );

        ctx.fill();

    }

    // velocidad ultra suave
    time += 0.003;

    requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
