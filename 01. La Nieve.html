<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OBS Pure Snow Points Slow</title>

<style>

html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
}

canvas{
    width:100%;
    height:100%;
    display:block;
}

</style>

</head>

<body>

<canvas id="canvas"></canvas>

<script>

const canvas =
document.getElementById("canvas");

const ctx =
canvas.getContext("2d");

let w,h,time=0;

function resize(){

    w =
    canvas.width =
    window.innerWidth;

    h =
    canvas.height =
    window.innerHeight;

}

window.addEventListener(
    "resize",
    resize
);

resize();



// ======================================
// CONFIG
// ======================================

const snow = [];
const total = 1400;



// ======================================
// CREATE PARTICLES
// ======================================

for(let i=0;i<total;i++){

    snow.push({

        x:
            Math.random() * w,

        y:
            Math.random() * h,

        z:
            Math.random(),

        size:
            Math.random() * 1.7 + 0.2,

        speed:
            Math.random() * 0.6 + 0.08,

        drift:
            Math.random() * 1000,

        swing:
            Math.random() * 1000

    });

}



// ======================================
// LOOP
// ======================================

function animate(){

    // CLEAN FRAME
    ctx.clearRect(
        0,
        0,
        w,
        h
    );

    // BLACK BACKGROUND
    ctx.fillStyle = "#000";

    ctx.fillRect(
        0,
        0,
        w,
        h
    );



    // ==================================
    // SNOW PARTICLES
    // ==================================

    for(const s of snow){

        // ORGANIC WIND
        const wind =

            Math.sin(
                time * 0.35 +
                s.drift
            ) * 1.1 +

            Math.cos(
                s.y * 0.002 +
                time * 0.18
            ) * 0.5;

        // SIDE MOVEMENT
        s.x +=
            wind *
            (0.2 + s.z);

        // FALL
        s.y +=
            s.speed *
            (0.4 + s.z * 1.4);

        // SOFT SWING
        s.x +=

            Math.sin(
                time * 0.8 +
                s.swing
            ) * 0.12;

        // RESET
        if(s.y > h + 20){

            s.y = -20;
            s.x = Math.random() * w;

        }

        if(s.x > w + 20){

            s.x = -20;

        }

        if(s.x < -20){

            s.x = w + 20;

        }

        // OPACITY
        const alpha =

            0.08 +

            s.z * 0.5;

        // CLEAN POINT
        ctx.beginPath();

        ctx.fillStyle =

            `rgba(255,255,255,${alpha})`;

        ctx.arc(
            s.x,
            s.y,
            s.size,
            0,
            Math.PI * 2
        );

        ctx.fill();

    }

    // SLOW CINEMATIC SPEED
    time += 0.0010;

    requestAnimationFrame(
        animate
    );
}

animate();

</script>

</body>
</html>
