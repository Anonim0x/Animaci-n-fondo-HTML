<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OBS Expanding Dot Waves</title>

<style>

html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
}

canvas{
    display:block;
    width:100%;
    height:100%;
}

</style>
</head>

<body>

<canvas id="canvas"></canvas>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let w,h;
let time = 0;

function resize(){

    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;

}

window.addEventListener("resize", resize);
resize();



// =====================================
// CONFIG
// =====================================

const spacing = 16;

let cols, rows;

function updateGrid(){

    cols = Math.ceil(w / spacing) + 8;
    rows = Math.ceil(h / spacing) + 8;

}

updateGrid();

window.addEventListener("resize", updateGrid);



// =====================================
// LOOP
// =====================================

function animate(){

    // fade suave cinematográfico
    ctx.fillStyle = "rgba(0,0,0,0.08)";
    ctx.fillRect(0,0,w,h);

    const centerX = w / 2;
    const centerY = h / 2;

    for(let y=-4; y<rows; y++){

        for(let x=-4; x<cols; x++){

            const px = x * spacing;
            const py = y * spacing;

            // =============================
            // DISTANCIA AL CENTRO
            // =============================

            const dxCenter =
                px - centerX;

            const dyCenter =
                py - centerY;

            const dist =
                Math.sqrt(
                    dxCenter*dxCenter +
                    dyCenter*dyCenter
                );

            // =============================
            // ONDA CIRCULAR EXPANSIVA
            // =============================

            const wave =

                Math.sin(
                    dist * 0.028
                    - time * 2
                ) * 14;

            // dirección radial
            const angle =
                Math.atan2(
                    dyCenter,
                    dxCenter
                );

            // movimiento expansivo
            const moveX =
                Math.cos(angle) * wave;

            const moveY =
                Math.sin(angle) * wave;

            const finalX =
                px + moveX;

            const finalY =
                py + moveY;

            // profundidad visual
            const z =

                Math.sin(
                    dist * 0.02
                    - time * 1.5
                );

            // tamaño pequeño elegante
            const size =
                0.6 + ((z + 1) * 1.8);

            // brillo suave
            const alpha =
                0.04 + ((z + 1) * 0.16);

            ctx.beginPath();

            ctx.fillStyle =
                `rgba(255,255,255,${alpha})`;

            ctx.arc(
                finalX,
                finalY,
                size,
                0,
                Math.PI * 2
            );

            ctx.fill();

        }
    }

    // movimiento lento cinematográfico
    time += 0.008;

    requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
