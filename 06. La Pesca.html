<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OBS Deep Digital Fabric</title>

<style>

html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
}

canvas{
    display:block;
    width:100%;
    height:100%;
}

</style>
</head>

<body>

<canvas id="canvas"></canvas>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let w,h;
let time = 0;

function resize(){

    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;

}

window.addEventListener("resize", resize);
resize();



// =====================================
// CONFIG
// =====================================

// grilla más fina
const spacing = 18;

let cols, rows;

function updateGrid(){

    cols = Math.ceil(w / spacing) + 6;
    rows = Math.ceil(h / spacing) + 6;

}

updateGrid();

window.addEventListener("resize", updateGrid);



// =====================================
// POSICIÓN DE NODOS
// =====================================

function getPoint(x,y){

    const px = x * spacing;
    const py = y * spacing;

    // =================================
    // ONDAS MÁS PROFUNDAS
    // =================================

    const wave1 =

        Math.sin(
            px * 0.007 +
            time * 0.55
        ) * 42;

    const wave2 =

        Math.cos(
            py * 0.007 -
            time * 0.40
        ) * 42;

    const diagonal =

        Math.sin(
            (px + py) * 0.0035 +
            time * 0.30
        ) * 34;

    // deformación final
    const dx =
        px + wave1 + diagonal;

    const dy =
        py + wave2 + diagonal;

    // profundidad
    const z =

        Math.sin(
            (px + py) * 0.0025 +
            time * 0.22
        );

    return {
        x:dx,
        y:dy,
        z:z
    };

}



// =====================================
// LOOP
// =====================================

function animate(){

    // fade suave cinematográfico
    ctx.fillStyle = "rgba(0,0,0,0.10)";
    ctx.fillRect(0,0,w,h);

    // =================================
    // DIBUJAR TELA DIGITAL
    // =================================

    for(let y=-2; y<rows; y++){

        for(let x=-2; x<cols; x++){

            const p =
                getPoint(x,y);

            const pRight =
                getPoint(x+1,y);

            const pBottom =
                getPoint(x,y+1);

            // profundidad visual
            const alpha =
                0.03 + ((p.z + 1) * 0.10);

            // líneas más finas
            ctx.strokeStyle =
                `rgba(255,255,255,${alpha})`;

            ctx.lineWidth =
                0.25 + ((p.z + 1) * 0.22);

            // línea horizontal
            ctx.beginPath();

            ctx.moveTo(p.x,p.y);
            ctx.lineTo(
                pRight.x,
                pRight.y
            );

            ctx.stroke();

            // línea vertical
            ctx.beginPath();

            ctx.moveTo(p.x,p.y);
            ctx.lineTo(
                pBottom.x,
                pBottom.y
            );

            ctx.stroke();

            // =================================
            // NODOS
            // =================================

            const size =
                0.25 + ((p.z + 1) * 0.55);

            ctx.beginPath();

            ctx.fillStyle =
                `rgba(255,255,255,${alpha * 1.5})`;

            ctx.arc(
                p.x,
                p.y,
                size,
                0,
                Math.PI * 2
            );

            ctx.fill();

        }
    }

    // movimiento ultra suave
    time += 0.004;

    requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
