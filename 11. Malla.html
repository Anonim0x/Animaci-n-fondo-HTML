<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Audio Reactive Line Field Thick</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  background: black;
  width: 100%;
  height: 100%;
}

canvas {
  position: absolute;
  width: 100%;
  height: 100%;
  filter: contrast(1.35) brightness(1.15);
}
</style>
</head>

<body>
<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let w, h;
function resize(){
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

// AUDIO
let audioCtx, analyser, dataArray;

async function initAudio(){
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  const source = audioCtx.createMediaStreamSource(stream);

  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 512;

  source.connect(analyser);

  dataArray = new Uint8Array(analyser.frequencyBinCount);
}

initAudio();

let t = 0;

// 🔧 MÁS ESPACIADO = menos moiré
const spacing = 28;

function getIntensity(){
  if(!analyser) return 0;

  analyser.getByteFrequencyData(dataArray);

  let sum = 0;
  for(let i=0;i<dataArray.length;i++){
    sum += dataArray[i];
  }
  return (sum / dataArray.length) / 255;
}

function draw(){
  requestAnimationFrame(draw);

  // fade más suave (reduce interferencia visual)
  ctx.fillStyle = "rgba(0,0,0,0.18)";
  ctx.fillRect(0,0,w,h);

  const intensity = getIntensity();

  // =========================
  // LÍNEAS HORIZONTALES
  // =========================
  for(let y = 0; y < h; y += spacing){
    ctx.beginPath();

    for(let x = 0; x <= w; x += 14){

      const wave =
        Math.sin(x * 0.008 + t + y * 0.015) * 14 +
        Math.sin(x * 0.015 + t * 1.2) * 10 +
        intensity * 55 * Math.sin(y * 0.01 + t);

      ctx.lineTo(x, y + wave);
    }

    ctx.strokeStyle = `rgba(255,255,255,${0.10 + intensity * 0.25})`;

    // 🔧 LÍNEA MÁS GRUESA (clave anti-moiré)
    ctx.lineWidth = 2.2;
    ctx.lineCap = "round";
    ctx.lineJoin = "round";

    ctx.stroke();
  }

  // =========================
  // LÍNEAS VERTICALES
  // =========================
  for(let x = 0; x < w; x += spacing){
    ctx.beginPath();

    for(let y = 0; y <= h; y += 14){

      const wave =
        Math.sin(y * 0.008 + t + x * 0.015) * 14 +
        Math.sin(y * 0.015 + t * 1.3) * 10 +
        intensity * 55 * Math.sin(x * 0.01 + t);

      ctx.lineTo(x + wave, y);
    }

    ctx.strokeStyle = `rgba(255,255,255,${0.07 + intensity * 0.2})`;

    ctx.lineWidth = 2.2;
    ctx.lineCap = "round";
    ctx.lineJoin = "round";

    ctx.stroke();
  }

  t += 0.01 + intensity * 0.04;
}

draw();
</script>

</body>
</html>
