<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OBS Soft 3D Dot Waves</title>

<style>

html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
}

canvas{
    display:block;
    width:100%;
    height:100%;
}

</style>
</head>

<body>

<canvas id="canvas"></canvas>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let w,h;
let time = 0;

function resize(){

    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;

}

window.addEventListener("resize", resize);
resize();



// =====================================
// CONFIG
// =====================================

const spacing = 24;

let cols, rows;

function updateGrid(){

    cols = Math.ceil(w / spacing) + 6;
    rows = Math.ceil(h / spacing) + 6;

}

updateGrid();

window.addEventListener("resize", updateGrid);



// =====================================
// LOOP
// =====================================

function animate(){

    // fade MUY suave
    ctx.fillStyle = "rgba(0,0,0,0.08)";
    ctx.fillRect(0,0,w,h);

    for(let y=-3; y<rows; y++){

        for(let x=-3; x<cols; x++){

            const px = x * spacing;
            const py = y * spacing;

            // =================================
            // ONDAS OBLICUAS SUAVES
            // =================================

            const wave =

                Math.sin(
                    (px + py) * 0.008
                    + time * 0.45
                ) * 20 +

                Math.cos(
                    (px - py) * 0.004
                    - time * 0.25
                ) * 10;

            // desplazamiento diagonal
            const dx =
                px + wave * 1.8;

            const dy =
                py + wave * 0.9;

            // profundidad ligera
            const z =
                Math.sin(
                    (px + py) * 0.005
                    + time * 0.3
                );

            // puntos pequeños
            const size =
                0.6 + ((z + 1) * 0.9);

            // brillo suave
            const alpha =
                0.08 + ((z + 1) * 0.12);

            ctx.beginPath();

            ctx.fillStyle =
                `rgba(255,255,255,${alpha})`;

            ctx.arc(
                dx,
                dy,
                size,
                0,
                Math.PI * 2
            );

            ctx.fill();

        }
    }

    // movimiento cinematográfico lento
    time += 0.0245;

    requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
