<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Void B&W</title>
<style>
html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
canvas { display: block; width: 100%; height: 100%; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");
let w, h;
function resize() { w = c.width = window.innerWidth; h = c.height = window.innerHeight; }
window.addEventListener("resize", resize);
resize();

const stars = Array.from({ length: 320 }, () => ({
    x: Math.random(), y: Math.random(),
    r: 0.2 + Math.random() * 1.4,
    base: 0.2 + Math.random() * 0.7,
    phase: Math.random() * Math.PI * 2,
    speed: 0.003 + Math.random() * 0.009,
}));

const rings = Array.from({ length: 7 }, (_, i) => ({
    phase: (i / 7) * Math.PI * 2,
    baseR: 60 + i * 80,
    speed: 0.008 + i * 0.002,
    lum: 140 + i * 16,
    width: 1.2 - i * 0.1,
}));

const blobs = Array.from({ length: 5 }, () => ({
    ax: 0.3 + Math.random() * 0.4,
    ay: 0.3 + Math.random() * 0.4,
    phaseX: Math.random() * Math.PI * 2,
    phaseY: Math.random() * Math.PI * 2,
    speedX: 0.001 + Math.random() * 0.002,
    speedY: 0.0008 + Math.random() * 0.0015,
    ampX: 0.18 + Math.random() * 0.12,
    ampY: 0.15 + Math.random() * 0.10,
    radius: 0.12 + Math.random() * 0.14,
    lum: 60 + Math.floor(Math.random() * 80),
    alpha: 0.04 + Math.random() * 0.04,
}));

const orbs = Array.from({ length: 40 }, () => ({
    angle: Math.random() * Math.PI * 2,
    dist: 80 + Math.random() * 260,
    speed: (0.001 + Math.random() * 0.003) * (Math.random() < 0.5 ? 1 : -1),
    size: 0.5 + Math.random() * 1.8,
    lum: 160 + Math.floor(Math.random() * 90),
    alpha: 0.3 + Math.random() * 0.5,
    phase: Math.random() * Math.PI * 2,
}));

let t = 0;

function draw() {
    ctx.fillStyle = "rgba(0,0,0,0.08)";
    ctx.fillRect(0, 0, w, h);

    const cx = w * 0.5, cy = h * 0.5;

    for (const b of blobs) {
        b.phaseX += b.speedX;
        b.phaseY += b.speedY;
        const bx = (b.ax + Math.sin(b.phaseX) * b.ampX) * w;
        const by = (b.ay + Math.cos(b.phaseY) * b.ampY) * h;
        const br = b.radius * Math.min(w, h);
        const grd = ctx.createRadialGradient(bx, by, 0, bx, by, br);
        grd.addColorStop(0, `rgba(${b.lum},${b.lum},${b.lum},${b.alpha})`);
        grd.addColorStop(0.5, `rgba(${b.lum*0.5|0},${b.lum*0.5|0},${b.lum*0.5|0},${b.alpha * 0.5})`);
        grd.addColorStop(1, `rgba(0,0,0,0)`);
        ctx.fillStyle = grd;
        ctx.fillRect(0, 0, w, h);
    }

    for (const s of stars) {
        const pulse = s.base + Math.sin(t * s.speed * 60 + s.phase) * 0.25;
        ctx.beginPath();
        ctx.arc(s.x * w, s.y * h, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(220,220,220,${pulse})`;
        ctx.fill();
    }

    for (const r of rings) {
        r.phase += r.speed;
        const pulse = Math.sin(r.phase) * 0.5 + 0.5;
        const radius = r.baseR + pulse * 30;
        const alpha = 0.06 + pulse * 0.12;
        ctx.beginPath();
        ctx.arc(cx, cy, radius, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(${r.lum},${r.lum},${r.lum},${alpha})`;
        ctx.lineWidth = r.width + pulse * 1.2;
        ctx.stroke();

        ctx.beginPath();
        ctx.arc(cx, cy, radius * 0.6, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(255,255,255,${alpha * 0.3})`;
        ctx.lineWidth = 0.4;
        ctx.stroke();
    }

    const corePulse = Math.sin(t * 0.8) * 0.5 + 0.5;
    const coreGrd = ctx.createRadialGradient(cx, cy, 0, cx, cy, 50 + corePulse * 20);
    coreGrd.addColorStop(0, `rgba(240,240,240,${0.25 + corePulse * 0.15})`);
    coreGrd.addColorStop(0.3, `rgba(160,160,160,0.10)`);
    coreGrd.addColorStop(1, `rgba(0,0,0,0)`);
    ctx.fillStyle = coreGrd;
    ctx.fillRect(0, 0, w, h);

    for (const o of orbs) {
        o.angle += o.speed;
        o.phase += 0.02;
        const dist = o.dist + Math.sin(o.phase) * 15;
        const ox = cx + Math.cos(o.angle) * dist;
        const oy = cy + Math.sin(o.angle) * dist * 0.55;
        const pulse = Math.sin(o.phase) * 0.3 + 0.7;
        ctx.beginPath();
        ctx.arc(ox, oy, o.size * pulse, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${o.lum},${o.lum},${o.lum},${o.alpha * pulse})`;
        ctx.fill();
    }

    const vig = ctx.createRadialGradient(cx, cy, h * 0.2, cx, cy, h * 0.85);
    vig.addColorStop(0, "rgba(0,0,0,0)");
    vig.addColorStop(1, "rgba(0,0,0,0.55)");
    ctx.fillStyle = vig;
    ctx.fillRect(0, 0, w, h);

    t += 0.008;
    requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
