<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OBS Ultra Dense Space</title>

<style>

html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
}

canvas{
    width:100%;
    height:100%;
    display:block;

    filter:
        contrast(128%)
        brightness(112%);
}

</style>
</head>

<body>

<canvas id="canvas"></canvas>

<script>

const canvas =
    document.getElementById("canvas");

const ctx =
    canvas.getContext("2d");

let w,h;

function resize(){

    w =
    canvas.width =
    window.innerWidth;

    h =
    canvas.height =
    window.innerHeight;

}

window.addEventListener(
    "resize",
    resize
);

resize();



// ======================================
// CONFIG
// ======================================

// TRIPLE DE DENSIDAD
const total = 15000;

const stars = [];

const center = {
    x:0,
    y:0
};



// ======================================
// CREAR ESTRELLAS
// ======================================

function createStars(){

    stars.length = 0;

    for(let i=0;i<total;i++){

        const star = {};

        resetStar(
            star,
            true
        );

        stars.push(star);

    }

}

function resetStar(star,randomZ=false){

    star.x =
        (Math.random() - 0.5)
        * w * 2.8;

    star.y =
        (Math.random() - 0.5)
        * h * 2.8;

    star.z =
        randomZ
        ? Math.random() * w
        : w;

    // más tamaños variados
    star.size =
        Math.random() * 1.2 + 0.05;

}

createStars();



// ======================================
// LOOP
// ======================================

function animate(){

    // menos fade para dejar más presencia
    ctx.fillStyle =
        "rgba(0,0,0,0.10)";

    ctx.fillRect(
        0,0,w,h
    );

    center.x = w/2;
    center.y = h/2;

    for(const s of stars){

        // velocidad suave
        s.z -= 0.75;

        if(s.z <= 1){

            resetStar(s);

        }

        const px =
            (s.x / s.z) * w +
            center.x;

        const py =
            (s.y / s.z) * h +
            center.y;

        const prevZ =
            s.z + 0.75;

        const prevX =
            (s.x / prevZ) * w +
            center.x;

        const prevY =
            (s.y / prevZ) * h +
            center.y;

        const depth =
            1 - s.z / w;

        // más brillo
        const alpha =
            0.03 +
            depth * 0.55;

        const size =
            s.size +
            depth * 1.4;

        // trail
        ctx.beginPath();

        ctx.strokeStyle =
            `rgba(255,255,255,${alpha})`;

        ctx.lineWidth =
            size * 0.45;

        ctx.moveTo(
            prevX,
            prevY
        );

        ctx.lineTo(
            px,
            py
        );

        ctx.stroke();

        // estrella
        ctx.beginPath();

        ctx.fillStyle =
            `rgba(255,255,255,${alpha})`;

        ctx.arc(
            px,
            py,
            size * 0.32,
            0,
            Math.PI * 2
        );

        ctx.fill();

    }

    requestAnimationFrame(
        animate
    );
}

animate();

</script>

</body>
</html>
